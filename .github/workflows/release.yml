name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions: read-all

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # Required for npm Trusted Publishing (OIDC) + Sigstore provenance

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Run tests before publishing
        run: node --test test/checks/*.test.js

      - name: Publish with provenance
        # Trusted Publishing: npm verifies the OIDC token from GitHub Actions directly.
        # No NPM_TOKEN secret required after npm Trusted Publishing is configured on npmjs.com.
        # --provenance attaches a Sigstore attestation (SLSA Build L2).
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
