name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Weekly — every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

# Top-level read-only — satisfies Scorecard's Token-Permissions check
permissions: read-all

jobs:
  scorecard:
    name: OpenSSF Scorecard analysis
    runs-on: ubuntu-latest

    # Write permissions declared at job level only, as required
    permissions:
      security-events: write
      id-token:        write
      contents:        read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          sarif_file: results.sarif
